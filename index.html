<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Now Playing · Spotify — kinderpingwi_</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800;900&family=Saira:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:transparent;overflow:hidden}
:root{--ink:#0a0608;--coal:#140a0d;--blood:#7a0f1f;--crimson:#c81f3d;--hot:#ff2a45;--sakura:#e0667e;--bone:#e8e2e4;--ash:#9b8f93;--fdisp:"Saira Condensed",sans-serif;--fui:"Saira",sans-serif}

#mount{position:fixed;left:14px;top:14px}
.kp-np{position:relative;display:flex;align-items:center;gap:13px;width:460px;padding:11px 16px 11px 18px;
  background:linear-gradient(135deg,rgba(20,10,13,.93),rgba(10,6,8,.94));
  border:1px solid rgba(200,31,61,.34);overflow:hidden;font-family:var(--fui)}
.kp-np::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--hot),var(--blood))}
.kp-np-art{position:relative;width:54px;height:54px;flex:0 0 auto;border-radius:5px;display:grid;place-items:center;
  overflow:hidden;background:linear-gradient(140deg,#2a0f17,#0a0608);border:1px solid rgba(200,31,61,.32);
  box-shadow:inset 0 0 16px rgba(200,31,61,.18),0 4px 12px rgba(0,0,0,.5)}
.kp-np-art svg{filter:drop-shadow(0 0 6px rgba(224,102,126,.5))}
.kp-np-art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.kp-np-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.kp-np-label{display:flex;align-items:center;gap:9px;font-weight:700;font-size:11px;letter-spacing:.2em;color:var(--ash);white-space:nowrap}
.kp-eq{display:inline-flex;align-items:flex-end;gap:2px;height:12px}
.kp-eq i{width:3px;height:100%;background:var(--hot);transform-origin:bottom;border-radius:1px}
.kp-np.playing .kp-eq i{animation:kpEq .9s ease-in-out infinite}
.kp-eq i:nth-child(2){animation-delay:.18s}.kp-eq i:nth-child(3){animation-delay:.36s}.kp-eq i:nth-child(4){animation-delay:.54s}
@keyframes kpEq{0%,100%{transform:scaleY(.28)}50%{transform:scaleY(1)}}
.kp-np-song{display:flex;align-items:baseline;gap:9px;min-width:0}
.kp-np-title{font-family:var(--fdisp);font-weight:700;font-size:21px;color:var(--bone);line-height:1.05;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
.kp-np-artist{flex:0 0 auto;font-size:13px;color:var(--sakura);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.kp-np-prog{display:flex;align-items:center;gap:9px;margin-top:5px}
.kp-np-time{font-size:11px;color:var(--ash);font-variant-numeric:tabular-nums;flex:0 0 auto}
.kp-np-bar{flex:1;height:4px;background:rgba(255,255,255,.08);overflow:hidden}
.kp-np-fill{height:100%;width:42%;background:linear-gradient(90deg,var(--blood),var(--hot));box-shadow:0 0 10px var(--hot);transition:width .25s linear}

/* settings */
.gear{position:absolute;right:7px;bottom:6px;width:18px;height:18px;border:0;background:none;cursor:pointer;
  color:var(--ash);opacity:.22;transition:opacity .15s;padding:0;z-index:5}
.kp-np:hover .gear{opacity:.7}
.gear:hover{opacity:1!important;color:var(--hot)}
.panel{position:fixed;left:14px;top:14px;width:460px;background:linear-gradient(160deg,#160b0f,#0a0608);
  border:1px solid var(--crimson);box-shadow:0 0 40px rgba(0,0,0,.7);padding:18px 20px;font-family:var(--fui);
  color:var(--bone);display:none;z-index:10}
.panel.open{display:block}
.panel h3{font-family:var(--fdisp);font-weight:900;letter-spacing:.06em;font-size:20px;margin:0 0 4px;text-transform:uppercase}
.panel p{font-size:12.5px;line-height:1.5;color:var(--ash);margin:0 0 12px}
.panel label{display:block;font-size:11px;letter-spacing:.16em;color:var(--ash);text-transform:uppercase;margin:10px 0 5px;font-weight:700}
.panel input{width:100%;background:#0a0608;border:1px solid rgba(200,31,61,.4);color:var(--bone);
  font-family:var(--fui);font-size:13px;padding:9px 11px;outline:none}
.panel input:focus{border-color:var(--hot)}
.uri{display:flex;gap:6px;align-items:stretch}
.uri code{flex:1;background:#0a0608;border:1px solid rgba(200,31,61,.3);color:var(--sakura);font-size:11px;
  padding:8px 10px;word-break:break-all;font-family:ui-monospace,monospace}
.btnrow{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;font-family:var(--fdisp);font-weight:800;letter-spacing:.06em;font-size:15px;text-transform:uppercase;
  padding:11px;border:1px solid var(--crimson);background:rgba(200,31,61,.12);color:var(--bone);cursor:pointer;transition:.15s}
.btn:hover{background:var(--crimson);color:#0a0608}
.btn.primary{background:linear-gradient(90deg,var(--crimson),var(--hot));color:#0a0608;border-color:transparent;box-shadow:0 0 20px rgba(255,42,69,.4)}
.btn.mini{flex:0 0 auto;padding:8px 12px;font-size:12px}
.status{margin-top:12px;font-size:12px;letter-spacing:.1em;display:flex;align-items:center;gap:8px;color:var(--ash)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ash)}
.dot.on{background:#3ad07a;box-shadow:0 0 8px #3ad07a}
.dot.demo{background:var(--hot);box-shadow:0 0 8px var(--hot)}
.panel a{color:var(--sakura)}
</style>
</head>
<body>
<div id="mount">
  <div class="kp-np" id="np">
    <div class="kp-np-art" id="art">
      <svg viewBox="0 0 24 24" width="23" height="23" fill="none"><path d="M19 3.5v9.9a3.2 3.2 0 1 1-1.7-2.83V6.7l-7.3 2.05v6.95a3.2 3.2 0 1 1-1.7-2.83V6.1L19 3.5z" fill="#e0667e"/></svg>
    </div>
    <div class="kp-np-info">
      <div class="kp-np-label"><span class="kp-eq"><i></i><i></i><i></i><i></i></span><span id="label">NOW PLAYING · SPOTIFY</span></div>
      <div class="kp-np-song"><span class="kp-np-title" id="title">Blinding Lights</span><span class="kp-np-artist" id="artist">The Weeknd</span></div>
      <div class="kp-np-prog"><span class="kp-np-time" id="cur">1:24</span><div class="kp-np-bar"><div class="kp-np-fill" id="fill"></div></div><span class="kp-np-time" id="dur">3:20</span></div>
    </div>
    <button class="gear" id="gear" title="Spotify settings" aria-label="settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm9 4a7 7 0 00-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 00-2-1.2l-.4-2.6H9.9l-.4 2.6a7 7 0 00-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 003 12c0 .4 0 .8.1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 002 1.2l.4 2.6h4.2l.4-2.6a7 7 0 002-1.2l2.4 1 2-3.4-2-1.6c.1-.4.1-.8.1-1.2z"/></svg>
    </button>
  </div>
</div>

<div class="panel" id="panel">
  <h3>Spotify Setup</h3>
  <p>Connect your Spotify so this widget shows your live track. One-time setup — see the Setup Guide for the full walkthrough.</p>
  <label>Spotify Client ID</label>
  <input id="cid" placeholder="paste your app's Client ID" autocomplete="off" spellcheck="false" />
  <label>Redirect URI — add this exact value in your Spotify app</label>
  <div class="uri"><code id="uri">—</code><button class="btn mini" id="copy">Copy</button></div>
  <div class="status"><span class="dot" id="dot"></span><span id="stat">Not connected · showing demo</span></div>
  <div class="btnrow">
    <button class="btn primary" id="connect">Connect</button>
    <button class="btn" id="disc">Disconnect</button>
    <button class="btn mini" id="close">Close</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const np = $('np');
const LS = {
  get cid(){return localStorage.getItem('kp_sp_cid')||''},
  set cid(v){localStorage.setItem('kp_sp_cid',v)},
  get access(){return localStorage.getItem('kp_sp_access')||''},
  get refresh(){return localStorage.getItem('kp_sp_refresh')||''},
  get exp(){return +(localStorage.getItem('kp_sp_exp')||0)},
};
const REDIRECT = location.origin + location.pathname;
const SCOPES = 'user-read-currently-playing user-read-playback-state';

$('uri').textContent = (location.protocol==='file:') ? 'must be hosted (see guide) — file:// not allowed by Spotify' : REDIRECT;
$('cid').value = LS.cid;

// ---- PKCE helpers ----
function rnd(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a,b=>('0'+b.toString(16)).slice(-2)).join('')}
async function sha256(s){return await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))}
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}

async function connect(){
  const cid = $('cid').value.trim();
  if(!cid){ $('cid').focus(); return; }
  LS.cid = cid;
  const v = rnd(48); localStorage.setItem('kp_sp_verifier', v);
  const challenge = b64url(await sha256(v));
  const p = new URLSearchParams({client_id:cid,response_type:'code',redirect_uri:REDIRECT,scope:SCOPES,code_challenge_method:'S256',code_challenge:challenge});
  location.href = 'https://accounts.spotify.com/authorize?'+p.toString();
}
function storeTokens(t){
  if(t.access_token) localStorage.setItem('kp_sp_access',t.access_token);
  if(t.refresh_token) localStorage.setItem('kp_sp_refresh',t.refresh_token);
  if(t.expires_in) localStorage.setItem('kp_sp_exp', Date.now()+t.expires_in*1000);
}
async function exchange(code){
  const v = localStorage.getItem('kp_sp_verifier')||'';
  const body = new URLSearchParams({client_id:LS.cid,grant_type:'authorization_code',code,redirect_uri:REDIRECT,code_verifier:v});
  const r = await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(r.ok){ storeTokens(await r.json()); }
  history.replaceState({},'',REDIRECT);
}
async function refreshToken(){
  if(!LS.refresh) return false;
  const body = new URLSearchParams({client_id:LS.cid,grant_type:'refresh_token',refresh_token:LS.refresh});
  const r = await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok) return false; storeTokens(await r.json()); return true;
}
function disconnect(){['access','refresh','exp','verifier'].forEach(k=>localStorage.removeItem('kp_sp_'+k));setStatus();renderDemo();}

// ---- render ----
function mmss(ms){ms=Math.max(0,ms|0);const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
const NOTE = '<svg viewBox="0 0 24 24" width="23" height="23" fill="none"><path d="M19 3.5v9.9a3.2 3.2 0 1 1-1.7-2.83V6.7l-7.3 2.05v6.95a3.2 3.2 0 1 1-1.7-2.83V6.1L19 3.5z" fill="#e0667e"/></svg>';
let prog = {playing:false, base:0, dur:1, at:0};

function renderDemo(){
  $('art').innerHTML = NOTE;
  $('label').textContent='NOW PLAYING · SPOTIFY';
  $('title').textContent='Blinding Lights'; $('artist').textContent='The Weeknd';
  prog={playing:true,base:84000,dur:200000,at:Date.now()};
  np.classList.add('playing');
}
function renderIdle(){
  $('art').innerHTML = NOTE;
  $('label').textContent='SPOTIFY · IDLE';
  $('title').textContent='Nothing playing'; $('artist').textContent='';
  prog={playing:false,base:0,dur:1,at:Date.now()};
  $('fill').style.width='0%'; $('cur').textContent='0:00'; $('dur').textContent='0:00';
  np.classList.remove('playing');
}
function renderTrack(d){
  const it=d.item; if(!it){renderIdle();return;}
  const img=(it.album&&it.album.images&&it.album.images.slice(-1)[0])||null;
  $('art').innerHTML = img ? '' : NOTE;
  if(img){const i=new Image();i.src=img.url;$('art').appendChild(i);}
  $('label').textContent='NOW PLAYING · SPOTIFY';
  $('title').textContent=it.name;
  $('artist').textContent=(it.artists||[]).map(a=>a.name).join(', ');
  prog={playing:!!d.is_playing,base:d.progress_ms||0,dur:it.duration_ms||1,at:Date.now()};
  np.classList.toggle('playing', !!d.is_playing);
}
function tick(){
  const now=Date.now();
  let p=prog.base + (prog.playing?(now-prog.at):0);
  p=Math.min(p,prog.dur);
  $('fill').style.width=(100*p/prog.dur)+'%';
  $('cur').textContent=mmss(p); $('dur').textContent=mmss(prog.dur);
}
setInterval(tick,250);

async function poll(){
  if(!LS.access){ return; }
  try{
    if(Date.now() > LS.exp-10000){ await refreshToken(); }
    const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing',{headers:{Authorization:'Bearer '+LS.access}});
    if(r.status===204){ renderIdle(); return; }
    if(r.status===401){ if(await refreshToken()) return poll(); else { disconnect(); return; } }
    if(!r.ok) return;
    renderTrack(await r.json());
  }catch(e){ /* keep last state */ }
}

function setStatus(){
  const connected = !!LS.access;
  $('dot').className = 'dot ' + (connected?'on':'demo');
  $('stat').textContent = connected ? 'Connected to Spotify' : 'Not connected · showing demo';
}

// settings wiring
$('gear').onclick=()=>{ $('panel').classList.add('open'); };
$('close').onclick=()=>$('panel').classList.remove('open');
$('connect').onclick=connect;
$('disc').onclick=disconnect;
$('copy').onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(REDIRECT);$('copy').textContent='Copied';setTimeout(()=>$('copy').textContent='Copy',1200);};

// boot
(async()=>{
  const code = new URLSearchParams(location.search).get('code');
  if(code){ await exchange(code); }
  setStatus();
  if(LS.access){ renderDemo(); poll(); } else { renderDemo(); }
  setInterval(poll, 4000);
})();
</script>
</body>
</html>
